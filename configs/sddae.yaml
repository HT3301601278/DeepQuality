data:
  quality_delay: 12
  scales:
    - [12, 1]
    - [24, 2]
    - [48, 4]

model:
  name: sddae_r
  latent_dim: 32
  hidden_dims: [64, 32]
  dropout: 0.0

training:
  batch_size: 64
  pretrain_epochs: 20
  finetune_epochs: 120
  learning_rate: 0.0003
  weight_decay: 0.0001
  patience: 20
  grad_clip: 1.0
  noise_std: 0.03
  lambda_rec: 0.5
  finetune_lambda_rec: 0.0
  lambda_sup: 1.0
  label_ratio: 1.0
